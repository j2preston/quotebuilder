name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger

concurrency:
  group: deploy-prod
  cancel-in-progress: false   # never cancel a running deploy

jobs:
  deploy:
    name: Build, push, deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Azure login ──────────────────────────────────────────────────────────
      # Secret: AZURE_CREDENTIALS — JSON from:
      #   az ad sp create-for-rbac --name quotebot-deploy \
      #     --role contributor \
      #     --scopes /subscriptions/<sub-id>/resourceGroups/rg-quotebot-prod \
      #     --sdk-auth
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # ── Resolve ACR login server ─────────────────────────────────────────────
      - name: Get ACR login server
        id: acr
        run: |
          SERVER=$(az acr list \
            --resource-group rg-quotebot-prod \
            --query "[0].loginServer" -o tsv)
          echo "server=${SERVER}" >> "$GITHUB_OUTPUT"

      # ── ACR authentication ───────────────────────────────────────────────────
      - name: Login to ACR
        run: az acr login --name "$(az acr list -g rg-quotebot-prod --query '[0].name' -o tsv)"

      # ── Build & push API ─────────────────────────────────────────────────────
      - name: Build and push API image
        run: |
          IMAGE="${{ steps.acr.outputs.server }}/quotebot-api"
          docker build \
            --file apps/api/Dockerfile \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      # ── Build & push Web ─────────────────────────────────────────────────────
      - name: Build and push Web image
        env:
          VITE_API_URL: https://ca-quotebot-api.thankfuldune-b686df08.uksouth.azurecontainerapps.io
        run: |
          IMAGE="${{ steps.acr.outputs.server }}/quotebot-web"
          docker build \
            --file apps/web/Dockerfile \
            --build-arg VITE_API_URL="${VITE_API_URL}" \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"

      # ── Update Container Apps ────────────────────────────────────────────────
      - name: Update API container app
        run: |
          az containerapp update \
            --name ca-quotebot-api \
            --resource-group rg-quotebot-prod \
            --image "${{ steps.acr.outputs.server }}/quotebot-api:${{ github.sha }}" \
            --output none

      - name: Update Web container app
        run: |
          az containerapp update \
            --name ca-quotebot-web \
            --resource-group rg-quotebot-prod \
            --image "${{ steps.acr.outputs.server }}/quotebot-web:${{ github.sha }}" \
            --output none

      # ── Print URLs ───────────────────────────────────────────────────────────
      - name: Print deployment URLs
        run: |
          API=$(az containerapp show -n ca-quotebot-api -g rg-quotebot-prod \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          WEB=$(az containerapp show -n ca-quotebot-web -g rg-quotebot-prod \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "### Deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Web | https://${WEB} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| API | https://${API} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Twilio webhook | https://${API}/api/webhooks/whatsapp |" >> "$GITHUB_STEP_SUMMARY"
